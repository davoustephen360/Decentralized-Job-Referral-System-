name: CI
on: [push]
jobs:
  tests:
    name: "Decentralized-Job-Referral-System"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v3
      - name: "Setup Node.js"
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: "Install dependencies"
        run: npm install
      - name: "Run tests"
        run: npm test
